  #   ports:
  #     - "8080:8080"
  #   environment:
  #     POSTGRES_URL: ${POSTGRES_URL}
  #     KAFKA_BROKERS: ${KAFKA_BROKERS}
  #     KAFKA_TOPIC: ${KAFKA_TOPIC}
  #     HTTP_ADDR: ${HTTP_ADDR:-:8080}
